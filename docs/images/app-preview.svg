  <rect x="706" y="470" width="76" height="44" rx="16" fill="#FFFFFF" stroke="#DDE4EF"/>
  <rect x="794" y="470" width="76" height="44" rx="16" fill="#FFFFFF" stroke="#DDE4EF"/>
  <text x="744" y="498" text-anchor="middle" fill="#344660" font-size="16" font-family="Arial, PingFang SC, sans-serif" font-weight="700">粘贴</text>
  <text x="832" y="498" text-anchor="middle" fill="#344660" font-size="16" font-family="Arial, PingFang SC, sans-serif" font-weight="700">删除</text>

  <rect x="410" y="530" width="456" height="128" rx="18" fill="#FFFDF8" stroke="#E89500" stroke-width="3"/>
  <text x="430" y="570" fill="#1F1F1F" font-size="13" font-family="Arial, PingFang SC, sans-serif">https://v.kuaishou.com/KvGL1atJ 神降 "圆头耄耋 "整活</text>
  <text x="430" y="600" fill="#1F1F1F" font-size="13" font-family="Arial, PingFang SC, sans-serif">"抽象 "壁纸 该作品在快手被播放过4.8万次，点击链接，打</text>
