  <text x="516" y="768" text-anchor="middle" fill="#344660" font-size="18" font-family="Arial, PingFang SC, sans-serif" font-weight="700">添加</text>
  <text x="643" y="768" text-anchor="middle" fill="#344660" font-size="18" font-family="Arial, PingFang SC, sans-serif" font-weight="700">粘贴最后一项</text>
