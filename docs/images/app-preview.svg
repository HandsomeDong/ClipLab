  <text x="386" y="810" fill="#344660" font-size="14" font-family="Arial, PingFang SC, sans-serif">当前输出目录：/Users/yuhaidong/Projects/test</text>

  <text x="1000" y="362" fill="#1E2740" font-size="24" font-family="Arial, PingFang SC, sans-serif" font-weight="700">下载说明</text>
  <rect x="1000" y="382" width="522" height="258" rx="20" fill="#FFFFFF" stroke="#DDE4EF"/>
  <text x="1022" y="430" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">输入内容可以是一整段分享文案，程序会自动提取里面的真实链</text>
  <text x="1022" y="458" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">接。</text>
  <text x="1022" y="520" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">文件名会优先使用作品标题；标题超过 10 个汉字时会自动截</text>
  <text x="1022" y="548" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">断。</text>
  <text x="1022" y="610" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">如果某个平台后续触发风控，可在设置页填写对应 Cookie 作为</text>
  <text x="1022" y="638" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">兜底。</text>
  <text x="1022" y="700" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">任务提交后会自动切到任务列表，你可以在那里查看实时进度和</text>
  <text x="1022" y="728" fill="#2C3C57" font-size="15" font-family="Arial, PingFang SC, sans-serif">失败原因。</text>

