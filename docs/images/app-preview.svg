  <text x="386" y="402" fill="#6E7E9A" font-size="15" font-family="Arial, PingFang SC, sans-serif">支持整段分享文案里的抖音、快手单视频链接。默认 1 个输入框，可</text>
  <text x="386" y="432" fill="#6E7E9A" font-size="15" font-family="Arial, PingFang SC, sans-serif">按需继续添加。</text>

