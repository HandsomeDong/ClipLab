  <rect x="478" y="734" width="76" height="52" rx="18" fill="#FFFFFF" stroke="#DDE4EF"/>
  <rect x="574" y="734" width="138" height="52" rx="18" fill="#FFFFFF" stroke="#DDE4EF"/>
  <rect x="732" y="734" width="152" height="52" rx="18" fill="#FFFFFF" stroke="#DDE4EF"/>
